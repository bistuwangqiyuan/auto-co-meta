version: "3.9"

# Auto-Co Docker Compose Stack
# Runs the autonomous loop, Telegram watcher, and optional dashboard.
#
# Usage:
#   make docker-start    # Start all services in background
#   make docker-stop     # Tear down all services
#   docker compose logs -f loop    # Follow loop logs
#   docker compose logs -f watcher # Follow watcher logs
#
# Required environment variables (set in .env):
#   ANTHROPIC_API_KEY=...
#   TELEGRAM_BOT_TOKEN=...   (optional, for escalations)
#   TELEGRAM_CHAT_ID=...     (optional, for escalations)

services:
  loop:
    build: .
    container_name: auto-co-loop
    command: bash auto-loop.sh
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Persist state across container restarts
      - ./memories:/app/memories
      - ./logs:/app/logs
      - ./docs:/app/docs
      - ./projects:/app/projects
    environment:
      - MODEL=${MODEL:-sonnet}
      - LOOP_INTERVAL=${LOOP_INTERVAL:-120}
      - CYCLE_TIMEOUT_SECONDS=${CYCLE_TIMEOUT_SECONDS:-1800}
      - MAX_CONSECUTIVE_ERRORS=${MAX_CONSECUTIVE_ERRORS:-3}

  watcher:
    build: .
    container_name: auto-co-watcher
    command: node watcher.js
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./memories:/app/memories
    depends_on:
      - loop
    profiles:
      - watcher

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: auto-co-dashboard
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - ./memories:/app/memories:ro
      - ./logs:/app/logs:ro
      - ./docs:/app/docs:ro
    profiles:
      - dashboard
