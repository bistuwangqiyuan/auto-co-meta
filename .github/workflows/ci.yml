name: CI

on:
  push:
    branches: [main]
    paths:
      - 'auto-loop.sh'
      - 'stop-loop.sh'
      - 'monitor.sh'
      - 'install-daemon.sh'
      - 'Makefile'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Install jq
        run: command -v jq || sudo apt-get install -y jq

      - name: Lint (shellcheck)
        run: make lint

      - name: Selftest
        run: |
          # Selftest needs claude CLI to exist (it checks for it)
          # Create a stub so the check passes
          mkdir -p /tmp/bin
          printf '#!/bin/bash\necho "claude-code stub 1.0.0"' > /tmp/bin/claude
          chmod +x /tmp/bin/claude
          export PATH="/tmp/bin:$PATH"
          ./auto-loop.sh --selftest
